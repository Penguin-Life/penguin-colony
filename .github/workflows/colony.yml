name: 🐧 Update Penguin Colony

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-colony:
    runs-on: ubuntu-latest
    name: Generate colony SVG

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate penguin colony
        uses: ./
        with:
          output: colony.svg

      - name: Commit & push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f colony.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🐧 Update penguin colony [skip ci]"
            git push
            echo "✅ Colony committed and pushed!"
          fi
